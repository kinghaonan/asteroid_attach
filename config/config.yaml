# 灏忚鏄熼檮鐫€杞ㄨ抗璁捐椤圭洰 - 閰嶇疆鏂囦欢
# 淇敼姝ゆ枃浠舵潵璋冩暣鍚勯樁娈电殑鍙傛暟锛屾棤闇€淇敼浠ｇ爜

# ==================== 绗竴闃舵锛氬紩鍔涘満瀛︿範 ====================
phase1:
  # PLY妯″瀷璁剧疆
  ply_file: "Castalia Radar-based.ply"
  target_diameter_m: 1400.0  # 鐩爣鐩村緞锛堢背锛?
  asteroid_density: 2670      # 灏忚鏄熷瘑搴︼紙kg/m鲁锛?
  
  # 鏍锋湰鐢熸垚璁剧疆
  sampling:
    num_samples: 500          # 鏍锋湰鏁伴噺锛堥獙璇佺敤500锛屾寮忕敤5000-10000锛?
    min_r_ratio: 1.001          # 鏈€灏忛噰鏍峰崐寰勫€嶆暟锛堢浉瀵瑰皬琛屾槦鍗婂緞锛?
    max_r_ratio: 5.0          # 鏈€澶ч噰鏍峰崐寰勫€嶆暟
    reuse_existing: true      # 鏄惁澶嶇敤宸插瓨鍦ㄧ殑鏍锋湰鏂囦欢
    
    # 鏍锋湰鏂囦欢璺緞锛堟敮鎸佷袱绉嶆牸寮忥紝浼樺厛浣跨敤 pkl锛?
    pkl_file: "data/samples/samples_with_gradient.pkl"  # pickle鏍煎紡锛堟帹鑽愶紝鍖呭惈瀹屾暣淇℃伅锛?
    npz_file: "data/samples/gravity_samples.npz"       # npz鏍煎紡锛堝鐢級
  
  # DNN妯″瀷鏋舵瀯
  model:
    input_dim: 3              # 杈撳叆缁村害锛堜綅缃畑yz锛?
    gravity_dim: 3            # 寮曞姏杈撳嚭缁村害
    gradient_dim: 9           # 姊害杈撳嚭缁村害
    shared_features: [256, 512, 512, 512, 256]  # 鍏变韩灞傜粨鏋?
    head_features: [128]      # 杈撳嚭澶村眰缁撴瀯
  
  # 璁粌鍙傛暟
  training:
    epochs: 200                # 璁粌杞
    batch_size: 64            # 鎵规澶у皬
    learning_rate: 0.0001     # 瀛︿範鐜?
    lr_scheduler_step: 20     # 瀛︿範鐜囪皟鏁存闀?
    lr_scheduler_gamma: 0.5   # 瀛︿範鐜囪皟鏁寸郴鏁?
    gravity_weight: 1.0       # 寮曞姏鎹熷け鏉冮噸
    gradient_weight: 0.5      # 姊害鎹熷け鏉冮噸
    print_freq: 5             # 鎵撳嵃棰戠巼锛堟瘡N杞墦鍗颁竴娆★級
  
  # 杈撳嚭璁剧疆
  output:
    model_file: "data/models/gravity_dnn_model.pth"
    save_plots: true

# ==================== 绗簩闃舵锛氳建杩逛紭鍖?====================
phase2:
  # 鑸ぉ鍣ㄥ弬鏁?
  spacecraft:
    T_max: 100.0              # 鏈€澶ф帹鍔涳紙N锛? 澧炲姞浠ョ‘淇濇湁瓒冲鎺у埗鑳藉姏
    I_sp: 400.0               # 姣斿啿锛坰锛?
    g0: 9.81                  # 鍦扮悆閲嶅姏鍔犻€熷害锛坢/s虏锛?
    m0: 1000.0                # 鍒濆璐ㄩ噺锛坘g锛?
  
  # 灏忚鏄熷弬鏁?
  asteroid:
    omega: [0, 0, 0.0003317]  # 鑷浆瑙掗€熷害锛坮ad/s锛夛紝2蟺/(5.27*3600)
    mu: 446300.0              # 寮曞姏甯告暟锛坢鲁/s虏锛?
    avoid_margin_m: 1.0
    avoid_weight: 100.0
    glide_slope_deg: 20.0
    glide_weight: 30.0
    vertical_window_s: 20.0
    vertical_weight: 30.0
    enforce_no_penetration: true
  
  # 杈圭晫鏉′欢
  boundary_conditions:
    r0: [2100.0069, -0.0040, 0.0096]
    v0: [0.0, 0.0, 0.0]
    rf: [599.5300, 39.5944, 113.9405]
    vf: [0.0, 0.0, 0.0]
    t_span: [0, 3500]
  
  # 浼氨娉曞弬鏁?
  pseudospectral:
    enabled: true             # 鏄惁鍚敤
    n_nodes: 80
    max_iter: 300             # 鏈€澶ц凯浠ｆ鏁?
  
  # 鎵撻澏娉曞弬鏁?
  shooting:
    n_nodes: 80
    enabled: true             # 鏄惁鍚敤
    n_guesses: 8              # 鍒濆鐚滄祴鏁伴噺
  
  # 鍚屼鸡娉曞弬鏁?
  homotopy:
    enabled: true             # 鏄惁鍚敤
    n_nodes: 80
    n_steps: 8
  
  # 鐩存帴娉?鍑镐紭鍖栧弬鏁?
  direct:
    enabled: true             # 鏄惁鍚敤
    n_nodes: 60
    max_iter: 50             # 鏈€澶ц凯浠ｆ鏁?
  
  # 鍑镐紭鍖栵紙SOCP锛夊弬鏁?- 鍩轰簬NASA璁烘枃
  socp:
    enabled: true             # 鍚敤SOCP
    n_nodes: 15               # 鑺傜偣鏁?
    max_iter: 20              # 鏈€澶ц凯浠ｆ鏁?
  
  # 杈撳嚭璁剧疆
  output:
    trajectory_file: "results/phase2/optimal_trajectory.pkl"
    save_plots: true

  # 澶栧眰椋炶鏃堕棿鎼滅储锛堝弬鑰冩枃鐚細鍥哄畾椋炶鏃堕棿 + 澶栧眰涓€缁翠紭鍖栵級
  time_search:
    t_min: 2000
    t_max: 6000
    samples: 7
    pos_weight: 10.0
    vel_weight: 5.0
    pos_thresh: 50.0
    vel_thresh: 5.0
    penalty: 1000000.0

  # Paper-style successive convexification
  convex_paper:
    dt: 5.0
    max_iterations: 8
    position_tolerance: 1.0
    fd_eps: 0.001
    solver: "ECOS"
    solver_max_iters: 5000
    solver_eps: 1.0e-6
    min_radius_margin: 0.0
    trust_radius_m: 3000.0
    min_radius_weight: 1000.0
    smooth_weight: 5.0
    max_delta_a: 0.1
    vertical_eps: 2.0

# ==================== 绗笁闃舵锛氭帶鍒朵笌浠跨湡 ====================
phase3:
  # PID鎺у埗鍣ㄥ弬鏁?
  pid:
    Kp: 0.8                   # 姣斾緥澧炵泭
    Ki: 0.02                   # 绉垎澧炵泭
    Kd: 0.4                   # 寰垎澧炵泭
    integral_limit: 100.0     # 绉垎闄愬箙
  
  # 鑷€傚簲PID鍙傛暟锛堝彲閫夛級
  adaptive_pid:
    enabled: false            # 鏄惁浣跨敤鑷€傚簲PID
    adaptation_rate: 0.01
    error_threshold: 1.0
  
  # 杞ㄨ抗璺熻釜浠跨湡鍙傛暟
  tracking:
    dt: 0.1                   # 鏃堕棿姝ラ暱锛坰锛?
    n_steps: 10               # 妯℃嫙姝ユ暟
    position_noise: 20.0      # 浣嶇疆鎵板姩锛坢锛?
    velocity_noise: 1.0       # 閫熷害鎵板姩锛坢/s锛?
  
  # 钂欑壒鍗℃礇妯℃嫙鍙傛暟
  monte_carlo:
    enabled: true             # 鏄惁鍚敤
    n_simulations: 20         # 妯℃嫙娆℃暟锛堥獙璇佺敤20锛屾寮忕敤100+锛?
    position_noise: 20.0      # 鍒濆浣嶇疆鎵板姩锛坢锛?
    velocity_noise: 1.0       # 鍒濆閫熷害鎵板姩锛坢/s锛?
    success_threshold: 70.0   # 鎴愬姛鐜囬槇鍊硷紙%锛?
  
  # 璇勪及鏍囧噯
  evaluation:
    max_position_error: 1.0  # 鏈€澶у厑璁镐綅缃宸紙m锛?
    max_velocity_error: 1.0   # 鏈€澶у厑璁搁€熷害璇樊锛坢/s锛?
    min_success_rate: 70.0    # 鏈€灏忔垚鍔熺巼锛?锛?
  
  # 杈撳嚭璁剧疆
  output:
    results_file: "results/phase3/control_simulation.pkl"
    report_file: "results/phase3/final_report.txt"
    save_plots: true

# ==================== 鍏ㄥ眬璁剧疆 ====================
global:
  # 闅忔満绉嶅瓙锛堢敤浜庡彲閲嶅鎬э級
  random_seed: 42
  
  # 缁樺浘璁剧疆
  plotting:
    dpi: 150                  # 鍥惧儚鍒嗚鲸鐜?
    figure_size: [15, 10]     # 榛樿鍥惧儚灏哄
    font_family: "SimHei"     # 涓枃瀛椾綋
    save_format: "png"        # 鍥惧儚鏍煎紡
  
  # 璋冭瘯妯″紡
  debug: false                # 鏄惁鎵撳嵃璋冭瘯淇℃伅
  
  # 宸ヤ綔鐩綍锛堢浉瀵逛簬椤圭洰鏍圭洰褰曪級
  working_directory: "."











